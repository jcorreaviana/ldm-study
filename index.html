<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LDM Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161d;
  --surface2: #1a1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --text2: #8890a4;
  --text3: #535970;
  --accent: #4f8fff;
  --accent-dim: rgba(79,143,255,0.12);
  --accent-border: rgba(79,143,255,0.3);
  --green: #3ecf8e;
  --green-dim: rgba(62,207,142,0.1);
  --green-border: rgba(62,207,142,0.25);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.1);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.1);
  --coral: #f87171;
  --coral-dim: rgba(248,113,113,0.1);
  --teal: #2dd4bf;
  --teal-dim: rgba(45,212,191,0.1);
  --font-body: 'Sora', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-lg: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-logo {
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.logo-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.logo-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.02em;
}
.logo-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.progress-section {
  padding: 0 20px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.progress-label {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}
.progress-track {
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

.nav-section-label {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text3);
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 0 20px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
  border-left: 2px solid transparent;
}
.nav-item:hover { background: var(--surface2); }
.nav-item.active {
  background: var(--accent-dim);
  border-left-color: var(--accent);
}
.nav-day-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-day-text {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.3;
  flex: 1;
  min-width: 0;
}
.nav-item.active .nav-day-text { color: var(--text); }
.nav-check {
  font-size: 14px;
  color: var(--green);
  opacity: 0;
  flex-shrink: 0;
  transition: opacity .2s;
}
.nav-check.visible { opacity: 1; }

.sidebar-footer {
  margin-top: auto;
  padding: 16px 20px 0;
  border-top: 1px solid var(--border);
}
.sidebar-footer-text {
  font-size: 11px;
  color: var(--text3);
  line-height: 1.5;
}

/* ── MAIN ── */
.main {
  padding: 32px 40px;
  max-width: 900px;
}

.day-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.day-number-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 3px;
}
.day-header-text {}
.day-header-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -.03em;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.2;
}
.day-header-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  max-width: 560px;
}

/* ── MODULE CARDS ── */
.modules-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.mod-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  position: relative;
  overflow: hidden;
}
.mod-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity .2s;
}
.mod-card:hover { background: var(--surface2); border-color: var(--border2); }
.mod-card:hover::before { opacity: 1; }
.mod-card.active { border-color: var(--accent-border); background: var(--accent-dim); }
.mod-card.active::before { background: var(--accent); opacity: 1; }
.mod-card.done { border-color: var(--green-border); }
.mod-card.done::before { background: var(--green); opacity: 1; }

.mod-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.mod-type-badge {
  font-size: 10px;
  font-family: var(--font-mono);
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: .04em;
}
.type-teoria { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
.type-pratica { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
.type-material { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,.25); }
.type-discovery { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(167,139,250,.25); }

.mod-done-icon { font-size: 16px; color: var(--green); opacity: 0; transition: opacity .2s; }
.mod-done-icon.visible { opacity: 1; }

.mod-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
.mod-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
.mod-kaggle-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 10px;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text3);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 7px;
}

/* ── DETAIL PANEL ── */
.detail-panel {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 20px;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.detail-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.detail-title { font-size: 16px; font-weight: 500; color: var(--text); letter-spacing: -.01em; }
.detail-close {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 16px;
  color: var(--text2);
  transition: background .15s;
}
.detail-close:hover { background: var(--surface2); color: var(--text); }

.detail-sections { display: flex; flex-direction: column; gap: 18px; }
.detail-sec-label {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text3);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.detail-body {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.75;
}

.kaggle-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-top: 8px;
}
.kaggle-block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.kaggle-badge {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--teal);
  background: var(--teal-dim);
  border: 1px solid rgba(45,212,191,.2);
  border-radius: 4px;
  padding: 2px 8px;
}
.kaggle-link-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  border-radius: var(--radius);
  padding: 4px 10px;
  cursor: pointer;
  text-decoration: none;
  transition: background .15s;
  font-family: var(--font-mono);
}
.kaggle-link-btn:hover { background: rgba(79,143,255,.2); text-decoration: none; }

.deliverable-block {
  background: var(--amber-dim);
  border: 1px solid rgba(245,166,35,.2);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.deliverable-block i { font-size: 16px; color: var(--amber); flex-shrink: 0; margin-top: 1px; }
.deliverable-text { font-size: 12px; color: var(--text2); line-height: 1.5; }

.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-family: var(--font-body);
  padding: 7px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .15s;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
}
.btn:hover { border-color: var(--border2); color: var(--text); background: #222636; }
.btn-primary { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.btn-primary:hover { background: rgba(79,143,255,.2); }
.btn-success { background: var(--green-dim); border-color: var(--green-border); color: var(--green); }
.btn-success:hover { background: rgba(62,207,142,.18); }

/* ── DAY FOOTER ── */
.day-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}
.footer-deliverables {
  font-size: 12px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
}
.mark-day-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-family: var(--font-body);
  padding: 7px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  transition: all .15s;
}
.mark-day-btn:hover { border-color: var(--green-border); color: var(--green); }
.mark-day-btn.done { border-color: var(--green-border); background: var(--green-dim); color: var(--green); }

/* ── COLOR CLASSES ── */
.c-d1 { background: rgba(99,85,255,.12); color: #a598ff; border-color: rgba(99,85,255,.3); }
.c-d2 { background: rgba(16,185,129,.1); color: #34d399; border-color: rgba(16,185,129,.3); }
.c-d3 { background: rgba(245,166,35,.1); color: #f5a623; border-color: rgba(245,166,35,.3); }
.c-d4 { background: rgba(248,113,113,.1); color: #f87171; border-color: rgba(248,113,113,.3); }
.c-d5 { background: rgba(79,143,255,.12); color: #4f8fff; border-color: rgba(79,143,255,.3); }
.c-d6 { background: rgba(52,211,153,.1); color: #34d399; border-color: rgba(52,211,153,.3); }
.c-d7 { background: rgba(248,113,113,.1); color: #fb923c; border-color: rgba(248,113,113,.3); }

.mod-card .c-d1::before { background: #a598ff; }
.mod-card .c-d2::before { background: #34d399; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding: 24px 20px; }
  .modules-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-label">NeoSpace</div>
    <div class="logo-title">LDM Academy</div>
    <div class="logo-sub">Produto &amp; soluções · 7 dias</div>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span>Progresso</span>
      <span id="prog-text">0 / 7</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="nav-section-label">Dias</div>
  <nav id="day-nav"></nav>

  <div class="sidebar-footer">
    <div class="sidebar-footer-text">
      Clique em um módulo para ver o conteúdo completo, exercício Kaggle e entregável.
    </div>
  </div>
</aside>

<main class="main" id="main-content"></main>

</div>

<script>
const DAYS = [
{
  id:1, color:"c-d1", label:"Dia 1",
  title:"O que é o LDM — e por que existe",
  desc:"Entender o problema que o LDM resolve antes de qualquer coisa técnica. Base de todas as conversas com clientes.",
  modules:[

      kaggle_url:"https://www.kaggle.com/datasets/mlg-ulb/creditcardfraud",
      saida:"Esboço do pipeline atual de um cliente fictício (banco ou telecom) com estimativa de custo de manutenção"
    },
    {
      id:"1b", type:"teoria",
      title:"O 'feature engineering wall'",
      desc:"Por que agregar dados antes do modelo é limitante — os 10 motivos.",
      teoria:"O whitepaper da NeoSpace lista 10 razões pelas quais feature engineering limita modelos: (1) perda de informação irreversível, (2) impossibilidade de agregar texto de forma significativa, (3) subrepresentação de clientes com poucos dados, (4) 'knowledge imprinting' — bias humano embutido, (5) custo de manutenção de feature stores, (6) especificidade de domínio, (7) rigidez temporal — mudanças de mercado invalidam features, (8) 'mean tyranny' — médias apagam picos comportamentais críticos, (9) 'causal blindness' — o modelo confirma hipóteses existentes, (10) windows fixas que não se adaptam. A analogia com AlphaZero é central: o modelo que aprende sem regras humanas supera aquele que aprende com elas.",
      kaggle:"No dataset de fraude, explore as features de tempo: 'Time' (segundos desde primeira transação) e 'Amount'. Observe que são os únicos campos brutos — todo o resto é PCA. Agora imagine: um fraudador que muda o padrão de horário gradualmente ao longo de semanas seria capturado por essas features? Esse é o 'mean tyranny' e a 'rigidez temporal' em ação.",
      kaggle_url:"https://www.kaggle.com/datasets/mlg-ulb/creditcardfraud",

},
{
  id:2, color:"c-d2", label:"Dia 2",
  title:"Como o LDM funciona — intuição sem código",
  desc:"Vocabulário técnico suficiente para conversar com engenheiros e clientes. Sem implementação.",
  modules:[
    {
      id:"2a", type:"teoria",
      title:"Transformer: a intuição",
      desc:"O que é atenção, token, sequência. Analogias práticas sem matemática.",
      teoria:"Um transformer lê uma sequência de itens (tokens) e aprende quais são mais relevantes para entender cada outro — isso é 'atenção'. Analogia de cliente: imagine que um cliente fez 200 transações no último ano. O transformer olha cada transação e pergunta: 'dado que estou tentando entender essa transação, quais das outras 199 são mais relevantes?'\n\nUm modelo clássico calcularia médias e perderia esse contexto. Um transformer memoriza que 3 saques em caixas diferentes em 10 minutos + uma compra online no mesmo dia = padrão específico que nenhuma feature agregada captura.\n\nO mecanismo de atenção permite que o modelo 'olhe para trás' com pesos diferentes para cada evento passado, dependendo do contexto atual.",
      kaggle:"No dataset de e-commerce (UCI Online Retail), ordene as transações de um único cliente por data e visualize a sequência. Escolha um cliente com 20+ transações. Observe: há sazonalidade? Há padrões de categoria? Há mudanças de comportamento ao longo do tempo? Esse exercício manual demonstra o que o transformer faz automaticamente para milhões de clientes.",

    },
    {
      id:"2b", type:"teoria",
      title:"Os 5 blocos da arquitetura LDM",
      desc:"Field encoders → fusion → temporal → spatial → output. O papel de cada bloco.",
      teoria:"1. Field encoders: converte cada campo (valor numérico, categoria, texto livre, timestamp) em um vetor numérico — uma 'representação geométrica' do dado. É o 'tradutor' universal.\n\n2. Local fusion layers: combina os campos de um mesmo evento para capturar interações. Ex: 'valor alto + horário incomum + localização nova' juntos = sinal de fraude que cada campo separado não revela.\n\n3. Temporal backbone: aprende dependências ao longo do tempo na sequência de eventos de um cliente. Captura o que aconteceu, em que ordem, e como padrões evoluem.\n\n4. Spatial backbone: aprende relações entre entidades diferentes (clientes que compartilham padrões de comportamento, mesmo sem conhecimento prévio de que são similares).\n\n5. Latent-state processor: converte o estado aprendido em uma decisão ou previsão — o 'output' que vai para os sistemas do cliente.",
      kaggle:"No dataset Telco Customer Churn, identifique quais colunas correspondem a cada bloco: (1) field encoders — cada coluna individual; (2) local fusion — combinações como 'MultipleLines + OnlineSecurity'; (3) temporal — imagine a sequência de chamadas de suporte que gerou 'tenure'; (4) spatial — clientes com perfis similares; (5) output — a coluna 'Churn'. Esse mapeamento mental é o que você faria em um discovery real.",

    },
    {
      id:"2c", type:"teoria",

  const nav = document.getElementById('day-nav');
  nav.innerHTML = DAYS.map(d => `
    <div class="nav-item${d.id === state.activeDay ? ' active' : ''}" onclick="selectDay(${d.id})">
      <span class="nav-day-pill ${d.color}">${d.label}</span>
      <span class="nav-day-text">${d.title}</span>
      <i class="ti ti-check nav-check${state.doneDays.has(d.id) ? ' visible' : ''}"></i>
    </div>
  `).join('');

  const done = state.doneDays.size;
  const pct = Math.round(done / 7 * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = done + ' / 7';
}

function renderMain() {
  const day = DAYS.find(d => d.id === state.activeDay);
  const activeMod = state.activeMod ? day.modules.find(m => m.id === state.activeMod) : null;

  const modsHtml = day.modules.map(m => {
    const isActive = state.activeMod === m.id;
    const isDone = state.doneMods.has(m.id);
    return `
      <div class="mod-card${isActive ? ' active' : ''}${isDone ? ' done' : ''}" onclick="toggleMod('${m.id}')">
        <div class="mod-card-top">
          <span class="mod-type-badge type-${m.type}">${m.type}</span>
          <i class="ti ti-check mod-done-icon${isDone ? ' visible' : ''}"></i>
        </div>
        <div class="mod-title">${m.title}</div>
        <div class="mod-desc">${m.desc}</div>
        ${m.kaggle_url ? `<div class="mod-kaggle-tag"><i class="ti ti-database" style="font-size:11px"></i> Kaggle</div>` : ''}
      </div>`;
  }).join('');

  let detailHtml = '';
  if (activeMod) {
    const isDone = state.doneMods.has(activeMod.id);
    const teoriaFormatted = activeMod.teoria.replace(/\n/g, '<br>');
    const kaggleFormatted = activeMod.kaggle ? activeMod.kaggle.replace(/\n/g, '<br>') : null;
    detailHtml = `
      <div class="detail-panel">
        <div class="detail-top">
          <div class="detail-title">${activeMod.title}</div>
          <button class="detail-close" onclick="closeDetail()"><i class="ti ti-x"></i></button>
        </div>
        <div class="detail-sections">
          <div>
            <div class="detail-sec-label">Conceito</div>
            <div class="detail-body">${teoriaFormatted}</div>
          </div>
          ${kaggleFormatted ? `
          <div>
            <div class="detail-sec-label">Exercício prático — Kaggle</div>
            <div class="kaggle-block">
              <div class="kaggle-block-header">
                <span class="kaggle-badge">dataset</span>
                <a href="${activeMod.kaggle_url}" target="_blank" class="kaggle-link-btn">
                  <i class="ti ti-external-link" style="font-size:12px"></i> Abrir no Kaggle
                </a>
              </div>
              <div class="detail-body">${kaggleFormatted}</div>
            </div>
          </div>` : (activeMod.kaggle_url ? `
          <div>
            <div class="detail-sec-label">Leitura recomendada</div>
            <a href="${activeMod.kaggle_url}" target="_blank" class="kaggle-link-btn" style="margin-top:0">
              <i class="ti ti-external-link" style="font-size:12px"></i> Abrir recurso
            </a>
          </div>` : '')}
          ${activeMod.saida ? `
          <div>
            <div class="deliverable-block">
              <i class="ti ti-package"></i>
              <div class="deliverable-text"><strong style="color:var(--amber)">Entregável:</strong> ${activeMod.saida}</div>
            </div>
          </div>` : ''}
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="window.open('${activeMod.kaggle_url || '#'}','_blank')">
            <i class="ti ti-player-play" style="font-size:13px"></i> Explorar exercício
          </button>
          <button class="btn" onclick="copyPrompt('${activeMod.id}')">
            <i class="ti ti-copy" style="font-size:13px"></i> Copiar prompt para Claude
          </button>
          <button class="btn${isDone ? ' btn-success' : ''}" onclick="toggleModDone('${activeMod.id}')">
            <i class="ti ti-${isDone ? 'check' : 'circle-check'}" style="font-size:13px"></i>
            ${isDone ? 'Concluído' : 'Marcar como concluído'}
          </button>
        </div>
      </div>`;
  }

  const isDayDone = state.doneDays.has(day.id);
  document.getElementById('main-content').innerHTML = `
    <div class="day-header">
      <span class="day-number-badge ${day.color}">${day.label}</span>
      <div class="day-header-text">
        <div class="day-header-title">${day.title}</div>
        <div class="day-header-desc">${day.desc}</div>
      </div>
    </div>
    <div class="modules-grid">${modsHtml}</div>
    ${detailHtml}
    <div class="day-footer">
      <div class="footer-deliverables">
        <i class="ti ti-package" style="font-size:14px"></i>
        ${day.modules.filter(m=>m.saida).length} entregáveis neste dia
      </div>
      <button class="mark-day-btn${isDayDone ? ' done' : ''}" onclick="toggleDay(${day.id})">
        <i class="ti ti-${isDayDone ? 'check' : 'circle-check'}" style="font-size:14px"></i>
        ${isDayDone ? 'Dia concluído' : 'Marcar dia como concluído'}
      </button>
    </div>`;
}

function selectDay(id) {
  state.activeDay = id;
  state.activeMod = null;
  renderNav();
  renderMain();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleMod(id) {
  state.activeMod = state.activeMod === id ? null : id;
  renderMain();
}

function closeDetail() {
  state.activeMod = null;
  renderMain();
}

function toggleModDone(id) {
  state.doneMods.has(id) ? state.doneMods.delete(id) : state.doneMods.add(id);
  renderMain();
}

function toggleDay(id) {
  state.doneDays.has(id) ? state.doneDays.delete(id) : state.doneDays.add(id);
  renderNav();
  renderMain();
}

function copyPrompt(modId) {
  const day = DAYS.find(d => d.modules.some(m => m.id === modId));
  const mod = day.modules.find(m => m.id === modId);
  const prompt = `Me ajuda com o módulo "${mod.title}" da LDM Academy.\n\nConceito a estudar: ${mod.teoria.substring(0, 200)}...\n\nQuero gerar o entregável: ${mod.saida}`;
  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.querySelector('[onclick="copyPrompt(\'' + modId + '\')"]');
    if (btn) { btn.innerHTML = '<i class="ti ti-check" style="font-size:13px"></i> Copiado!'; setTimeout(() => renderMain(), 1500); }
  }).catch(() => alert('Copie manualmente:\n\n' + prompt));
}

init();
</script>
</body>
</html>
